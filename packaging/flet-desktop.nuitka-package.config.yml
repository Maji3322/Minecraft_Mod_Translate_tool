# yaml-language-server: $schema=../.vscode/schemas/nuitka-package-config.schema.json
# yamllint disable rule:line-length
# yamllint disable rule:indentation
# yamllint disable rule:comments-indentation
---
# NOTE: This file is kept for reference only.
# The flet_desktop/app directory (containing flet.exe and DLLs) is included
# directly via --include-data-dir in the CI workflow, which is more reliable
# than the dlls/from_filenames approach for pre-bundled Flutter executables.
- module-name: "flet_desktop"
