# yaml-language-server: $schema=../.vscode/schemas/nuitka-package-config.schema.json
# yamllint disable rule:line-length
# yamllint disable rule:indentation
# yamllint disable rule:comments-indentation
---
- module-name: 'flet_desktop'
  data-files:
    dirs:
      - 'app'
  dlls:
    # Nuitka treats Windows executables like DLLs and requires the
    # executable flag for them to be preserved in standalone/onefile builds.
    - from_filenames:
        relative_path: 'app/flet'
        prefixes:
          - ''
        suffixes:
          - 'exe'
        executable: 'yes'
      dest_path: 'app/flet'
      when: 'win32'
    - from_filenames:
        relative_path: 'app/flet'
        prefixes:
          - ''
        suffixes:
          - 'dll'
      dest_path: 'app/flet'
      when: 'win32'
