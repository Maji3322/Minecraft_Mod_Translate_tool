# .github/workflows/main.yml
name: Compile with Nuitka and Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Cache Nuitka and ccache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.ccache
                      ~/.nuitka
                  key: ${{ runner.os }}-nuitka-ccache-${{ hashFiles('**/requirements.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-nuitka-ccache-

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Install ccache (choco)
              shell: bash
              run: |
                  choco install ccache -y
                  echo "export NUITKA_CCACHE_BINARY=$(which ccache)" >> $GITHUB_ENV

            - name: Compile with Nuitka
              uses: Nuitka/Nuitka-Action@main
              with:
                  script-name: main.py
                  mode: onefile
                  windows-disable-console: true
                  windows-icon-from-ico: "resources/icon.ico"
                  include-data-dir: "resources=resources"
                  output-dir: "dist"

            - name: Create release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  release_name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false

            - name: Upload Release Asset
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./dist/main.exe
                  asset_name: main.exe
                  asset_content_type: application/vnd.microsoft.portable-executable
