# .github/workflows/main.yml
name: Compile with Nuitka and Release

on:
    push:
        tags:
            - "v*"

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-latest
        env:
            CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
            NUITKA_CACHE_DIR: ${{ github.workspace }}/.cache/nuitka
            NUITKA_VERSION: "4.0.5"

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Extract version from tag
              id: get_version
              shell: bash
              run: |
                  # Extract version from tag (e.g., v0.8.0 -> 0.8.0)
                  VERSION=${GITHUB_REF_NAME#v}

                  # Validate semantic versioning format (X.Y.Z)
                  # Note: This only accepts basic semantic versions (X.Y.Z).
                  # Pre-release versions (e.g., 1.0.0-alpha) are not supported.
                  if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "Error: Invalid version format '$VERSION'. Expected semantic version (e.g., 0.8.0)"
                      exit 1
                  fi

                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Version extracted and validated: $VERSION"

            - name: Update version in src/__init__.py
              shell: bash
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"

                  # NOTE:
                  # This updates the version in src/__init__.py only within the CI
                  # build environment so that the built artifact embeds the tag
                  # version. These changes are not committed back to the repository,
                  # so src/__init__.py in the repo may show an older version.

                  # Update the package version constant using Python for robust parsing.
                  export VERSION
                  python - << 'PY'
                  import os
                  import pathlib
                  import re

                  version = os.environ["VERSION"]
                  path = pathlib.Path("src/__init__.py")
                  lines = path.read_text(encoding="utf-8").splitlines()

                  updated = False

                  for index, line in enumerate(lines):
                      if re.match(r'^__version__\s*=\s*".*"$', line):
                          lines[index] = f'__version__ = "{version}"'
                          updated = True
                          break

                  if not updated:
                      raise SystemExit("__version__ line not found in src/__init__.py")

                  path.write_text("\n".join(lines) + "\n", encoding="utf-8")
                  PY

                  echo "Updated src/__init__.py with version $VERSION (CI-only change)"
                  grep '^__version__ = ' src/__init__.py

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: "requirements.txt"

            - name: Prepare cache directories
              shell: bash
              run: |
                  mkdir -p "$CCACHE_DIR" "$NUITKA_CACHE_DIR"

            - name: Cache compiler artifacts
              uses: actions/cache@v5
              with:
                  path: |
                      ${{ env.CCACHE_DIR }}
                      ${{ env.NUITKA_CACHE_DIR }}
                  key: ${{ runner.os }}-build-cache-${{ env.NUITKA_VERSION }}-${{ hashFiles('requirements.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-build-cache-${{ env.NUITKA_VERSION }}-
                      ${{ runner.os }}-build-cache-

            - name: Install dependencies
              shell: bash
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install "nuitka==${NUITKA_VERSION}" zstandard

            - name: Install ccache (choco)
              shell: bash
              run: |
                  choco install ccache -y
                  echo "NUITKA_CCACHE_BINARY=$(which ccache)" >> $GITHUB_ENV

            - name: Compile with Nuitka
              shell: bash
              run: |
                  FLET_DESKTOP_DIR=$(python -c "from pathlib import Path; import flet_desktop; print(Path(flet_desktop.__file__).parent.as_posix())")

                  # --include-raw-dir is required instead of --include-data-dir
                  # because --include-data-dir silently excludes .dll, .exe, and
                  # .pyd files.  The Flet desktop client consists of flet.exe and
                  # many DLLs, so --include-raw-dir ensures they are all bundled.
                  python -m nuitka \
                    --mode=onefile \
                    --windows-console-mode=disable \
                    --windows-icon-from-ico=resources/icon.ico \
                    --include-data-dir=resources=resources \
                    --include-package=flet_desktop \
                    --include-raw-dir="${FLET_DESKTOP_DIR}/app=flet_desktop/app" \
                    --output-dir=dist \
                    --assume-yes-for-downloads \
                    main.py

            - name: Verify bundled Flet client
              shell: bash
              run: |
                  # Ensure the onefile build included the Flet executable.
                  # The onefile dist directory is created by Nuitka before
                  # packing into the single executable.
                  DIST_DIR="dist/main.dist"
                  FLET_EXE="$DIST_DIR/flet_desktop/app/flet/flet.exe"
                  if [ -d "$DIST_DIR" ]; then
                      echo "Checking standalone dist for flet.exe..."
                      if [ -f "$FLET_EXE" ]; then
                          echo "OK: flet.exe found at $FLET_EXE"
                      else
                          echo "ERROR: flet.exe NOT found at $FLET_EXE"
                          echo "Contents of $DIST_DIR/flet_desktop/:"
                          find "$DIST_DIR/flet_desktop/" -type f 2>/dev/null || echo "(directory missing)"
                          exit 1
                      fi
                  else
                      echo "Standalone dist directory not found (normal for onefile mode)"
                  fi
                  echo "Onefile binary size: $(du -h dist/main.exe 2>/dev/null | cut -f1 || echo 'N/A')"

            - name: Rename executable to include version
              shell: bash
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"
                  mv dist/main.exe "dist/MinecraftModTranslateTool-v${VERSION}.exe"
                  echo "Renamed to MinecraftModTranslateTool-v${VERSION}.exe"

            - name: Upload Release Asset
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/MinecraftModTranslateTool-v${{ steps.get_version.outputs.version }}.exe
                  fail_on_unmatched_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
