# .github/workflows/main.yml
name: Compile with Nuitka and Release

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Extract version from tag
              id: get_version
              shell: bash
              run: |
                  VERSION=${GITHUB_REF_NAME#v}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "Version extracted: $VERSION"

            - name: Update version in pyproject.toml
              shell: bash
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"
                  sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
                  echo "Updated pyproject.toml with version $VERSION"
                  grep "^version = " pyproject.toml

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Cache Nuitka and ccache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.ccache
                      ~/.nuitka
                  key: ${{ runner.os }}-nuitka-ccache-${{ hashFiles('**/requirements.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-nuitka-ccache-

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Install ccache (choco)
              shell: bash
              run: |
                  choco install ccache -y
                  echo "export NUITKA_CCACHE_BINARY=$(which ccache)" >> $GITHUB_ENV

            - name: Compile with Nuitka
              uses: Nuitka/Nuitka-Action@main
              with:
                  script-name: main.py
                  mode: onefile
                  windows-disable-console: true
                  windows-icon-from-ico: "resources/icon.ico"
                  include-data-dir: "resources=resources"
                  output-dir: "dist"

            - name: Rename executable to include version
              shell: bash
              run: |
                  VERSION="${{ steps.get_version.outputs.version }}"
                  mv dist/main.exe "dist/MinecraftModTranslateTool-v${VERSION}.exe"
                  echo "Renamed to MinecraftModTranslateTool-v${VERSION}.exe"

            - name: Upload Release Asset
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/MinecraftModTranslateTool-v${{ steps.get_version.outputs.version }}.exe
                  fail_on_unmatched_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
